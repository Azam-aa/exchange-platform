spring.application.name=exchange-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/exchange_db
spring.datasource.username=azam
spring.datasource.password=azam
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Settings (Manages the DataSource traffic)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

# Formats the SQL in the console so it is easy to read
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate to use the PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080
server.error.include-message=always

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always